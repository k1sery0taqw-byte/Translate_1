<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manhwa Auto Орчуулагч</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap');

:root {
  --ink: #0a0a0f;
  --panel: #12121a;
  --border: #2a2a3a;
  --accent: #e63946;
  --gold: #f4a261;
  --paper: #f5f0e8;
  --dim: #6b6b8a;
  --green: #2dc653;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--ink);
  color: var(--paper);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, #ffffff06 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events: none;
}

.wrap {
  position: relative;
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
}

.header {
  text-align: center;
  padding: 20px 0 16px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 18px;
}

.logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 36px;
  letter-spacing: 4px;
  line-height: 1;
}
.logo span { color: var(--accent); }

.logo-sub {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--dim);
  margin-top: 4px;
}

.badge-free {
  display: inline-block;
  background: var(--green);
  color: #000;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 2px 8px;
  border-radius: 20px;
  margin-top: 6px;
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 4px;
  padding: 32px 16px;
  text-align: center;
  cursor: pointer;
  background: var(--panel);
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.upload-zone.drag { border-color: var(--accent); background: #1a0a0e; }
.upload-zone.has-image { padding: 0; border-style: solid; border-color: var(--gold); }

#file-input { display: none; }

.upload-icon { font-size: 36px; margin-bottom: 8px; }
.upload-title {
  font-family: 'Bebas Neue', cursive;
  font-size: 20px;
  letter-spacing: 2px;
}
.upload-sub { font-size: 11px; color: var(--dim); margin-top: 4px; }

.preview-img { width: 100%; display: block; }

.preview-overlay {
  position: absolute;
  inset: 0;
  background: #0009;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.upload-zone.has-image:hover .preview-overlay,
.upload-zone.has-image:active .preview-overlay { opacity: 1; }
.preview-overlay span {
  font-family: 'Bebas Neue', cursive;
  font-size: 16px;
  letter-spacing: 2px;
  background: var(--accent);
  padding: 8px 16px;
  border-radius: 2px;
}

.steps {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}

.step {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 4px;
  text-align: center;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  transition: all 0.3s;
}

.step .si { font-size: 16px; display: block; margin-bottom: 3px; }
.step.active { border-color: var(--gold); color: var(--gold); }
.step.done { border-color: var(--green); color: var(--green); }
.step.err-s { border-color: var(--accent); color: var(--accent); }

.btn-main {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 16px;
  font-family: 'Bebas Neue', cursive;
  font-size: 22px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-main:hover:not(:disabled) { background: #c1121f; transform: translateY(-1px); }
.btn-main:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; transform: none; }

.prog-wrap { display: none; margin-bottom: 14px; }
.prog-wrap.show { display: block; }

.prog-bg {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  height: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 2px;
  transition: width 0.5s ease;
  width: 0%;
}

.prog-text {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.dots span {
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
  animation: dp 1.2s ease-in-out infinite;
  margin-right: 2px;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dp {
  0%,80%,100% { opacity:.2; transform:scale(.8); }
  40% { opacity:1; transform:scale(1.2); }
}

.err-box {
  display: none;
  background: #1a0a0e;
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 12px;
  font-size: 12px;
  color: #ff6b7a;
  margin-bottom: 14px;
  line-height: 1.6;
}
.err-box.show { display: block; }

.result { display: none; margin-bottom: 14px; }
.result.show { display: block; }

.result-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cnt {
  background: var(--accent);
  color: white;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 700;
}

#out-canvas {
  width: 100%;
  border: 1px solid var(--gold);
  border-radius: 4px;
  display: block;
  margin-bottom: 12px;
}

.tlist {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 12px;
  max-height: 200px;
  overflow-y: auto;
}
.tlist::-webkit-scrollbar { width: 3px; }
.tlist::-webkit-scrollbar-thumb { background: var(--border); }

.tcard {
  background: var(--panel);
  border-left: 3px solid var(--accent);
  border-radius: 0 4px 4px 0;
  padding: 9px 12px;
}
.tcard-kr { font-size: 12px; color: var(--dim); margin-bottom: 3px; }
.tcard-arr { font-size: 10px; color: var(--accent); margin-bottom: 3px; }
.tcard-mn { font-size: 13px; color: var(--gold); line-height: 1.5; }

.btn-row { display: flex; gap: 8px; }

.btn-dl {
  flex: 1;
  background: transparent;
  color: var(--gold);
  border: 2px solid var(--gold);
  border-radius: 4px;
  padding: 13px 8px;
  font-family: 'Bebas Neue', cursive;
  font-size: 18px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-dl:hover { background: var(--gold); color: var(--ink); }

.btn-rst {
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 13px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-rst:hover { color: white; border-color: var(--dim); }

.footer {
  text-align: center;
  padding: 14px 0 6px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">MANHWA<span>·</span>MN</div>
    <div class="logo-sub">АВТОМАТ ОРЧУУЛАГЧ</div>
    <div class="badge-free">✓ API KEY ШААРДАХГҮЙ · ҮНЭГҮЙ</div>
  </div>

  <div class="upload-zone" id="zone">
    <input type="file" id="file-input" accept="image/*"/>
    <span class="upload-icon">🖼️</span>
    <div class="upload-title">Manhwa зураг оруул</div>
    <div class="upload-sub">JPG / PNG · Tap хийнэ үү</div>
    <div class="preview-overlay"><span>Өөрчлөх</span></div>
  </div>

  <div class="steps">
    <div class="step" id="step1"><span class="si">🔍</span>OCR</div>
    <div class="step" id="step2"><span class="si">🌐</span>ОРЧУУЛГА</div>
    <div class="step" id="step3"><span class="si">🎨</span>RENDER</div>
  </div>

  <button class="btn-main" id="btn-go" disabled>
    <span>⚡</span> АВТОМАТ ОРЧУУЛАХ
  </button>

  <div class="prog-wrap" id="prog">
    <div class="prog-bg"><div class="prog-fill" id="pfill"></div></div>
    <div class="prog-text">
      <span id="plabel">Уншиж байна</span>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="err-box" id="errbox"></div>

  <div class="result" id="result">
    <div class="result-label">
      <span>📋 ОРЧУУЛСАН ТЕКСТ</span>
      <span class="cnt" id="cntlabel">0 БЛОК</span>
    </div>
    <canvas id="out-canvas"></canvas>
    <div class="tlist" id="tlist"></div>
    <div class="btn-row">
      <button class="btn-dl" id="btn-dl">⬇ ЗУРАГ ТАТАХ</button>
      <button class="btn-rst" id="btn-rst">↩ Дахин</button>
    </div>
  </div>

  <div class="footer">Tesseract.js OCR · MyMemory API · Canvas · Үнэгүй</div>
</div>

<script>
const zone    = document.getElementById('zone');
const fileIn  = document.getElementById('file-input');
const btnGo   = document.getElementById('btn-go');
const prog    = document.getElementById('prog');
const pfill   = document.getElementById('pfill');
const plabel  = document.getElementById('plabel');
const errbox  = document.getElementById('errbox');
const resultEl= document.getElementById('result');
const canvas  = document.getElementById('out-canvas');
const tlist   = document.getElementById('tlist');
const cntlabel= document.getElementById('cntlabel');
const btnDl   = document.getElementById('btn-dl');
const btnRst  = document.getElementById('btn-rst');
const s1 = document.getElementById('step1');
const s2 = document.getElementById('step2');
const s3 = document.getElementById('step3');

let imgDataUrl = null;
let blocks = [];

// ── Upload ──────────────────────────────────────────────────────
zone.addEventListener('click', () => fileIn.click());
fileIn.addEventListener('change', () => { if(fileIn.files[0]) loadFile(fileIn.files[0]); });
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) loadFile(f);
});

function loadFile(f) {
  const r = new FileReader();
  r.onload = ev => {
    imgDataUrl = ev.target.result;
    zone.classList.add('has-image');
    const old = zone.querySelector('img.prev'); if(old) old.remove();
    const img = document.createElement('img');
    img.className = 'prev preview-img'; img.src = imgDataUrl;
    zone.insertBefore(img, zone.querySelector('.preview-overlay'));
    zone.querySelectorAll('.upload-icon,.upload-title,.upload-sub')
        .forEach(el => el.style.display = 'none');
    btnGo.disabled = false;
  };
  r.readAsDataURL(f);
}

// ── Main run ────────────────────────────────────────────────────
btnGo.addEventListener('click', async () => {
  hideErr(); resultEl.classList.remove('show');
  prog.classList.add('show'); btnGo.disabled = true;
  clearSteps();

  try {
    // STEP 1 — OCR
    step(s1, 'active');
    setP(5, 'Korean OCR эхлэж байна...');

    const ocr = await Tesseract.recognize(imgDataUrl, 'kor', {
      logger: m => {
        if(m.status === 'recognizing text')
          setP(5 + Math.round(m.progress * 42), 'OCR: ' + Math.round(m.progress*100) + '%');
      }
    });

    const raw = (ocr.data.blocks || []).filter(b => b.confidence > 25 && b.text.trim().length > 0);
    if(!raw.length) throw new Error('Korean текст олдсонгүй.\nИлүү тод, тодорхой зураг оруулна уу.');

    step(s1, 'done');
    setP(50, raw.length + ' текст блок олдлоо');

    // STEP 2 — Translate
    step(s2, 'active');
    blocks = [];
    for(let i = 0; i < raw.length; i++) {
      const b = raw[i];
      const korean = b.text.trim();
      setP(50 + Math.round((i / raw.length) * 28), `Орчуулж байна ${i+1}/${raw.length}...`);
      const mongolian = await translate(korean);
      blocks.push({ korean, mongolian, bbox: b.bbox });
      await sleep(130);
    }

    step(s2, 'done');
    setP(82, 'Canvas зурж байна...');

    // STEP 3 — Render
    step(s3, 'active');
    await render();
    renderList();
    step(s3, 'done');
    setP(100, 'Дууслаа ✓');

    setTimeout(() => {
      prog.classList.remove('show');
      resultEl.classList.add('show');
      btnGo.disabled = false;
    }, 600);

  } catch(e) {
    prog.classList.remove('show');
    showErr(e.message || 'Алдаа гарлаа.');
    [s1,s2,s3].forEach(s => { if(s.classList.contains('active')) { s.classList.remove('active'); s.classList.add('err-s'); }});
    btnGo.disabled = false;
  }
});

// ── Translate via MyMemory (free, no key) ───────────────────────
async function translate(text) {
  const q = text.replace(/\n/g,' ').trim();
  if(!q) return '';
  try {
    // Try Korean → Mongolian directly
    const r1 = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(q)}&langpair=ko|mn`);
    const d1 = await r1.json();
    const t1 = d1?.responseData?.translatedText;
    if(t1 && t1 !== q && d1.responseStatus === 200) return t1;

    // Fallback: Korean → English
    const r2 = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(q)}&langpair=ko|en`);
    const d2 = await r2.json();
    return d2?.responseData?.translatedText || q;
  } catch { return q; }
}

// ── Canvas render ────────────────────────────────────────────────
function render() {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      for(const b of blocks) {
        const {x0, y0, x1, y1} = b.bbox;
        const bw = x1 - x0, bh = y1 - y0;
        if(bw < 4 || bh < 4) continue;

        const pad = Math.min(bw, bh) * 0.14;
        const fx = x0 - pad, fy = y0 - pad;
        const fw = bw + pad*2, fh = bh + pad*2;

        // Sample background color at corners
        const bg = sampleBg(ctx, x0, y0, bw, bh);
        const dark = isDark(bg);

        // Erase Korean text — fill bubble area
        ctx.fillStyle = bg;
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(fx, fy, fw, fh, 5);
        else ctx.rect(fx, fy, fw, fh);
        ctx.fill();

        // Write Mongolian text
        ctx.fillStyle = dark ? '#ffffff' : '#111111';
        ctx.textAlign = 'center';
        const maxW = fw - 8;
        let fs = Math.max(9, Math.min(bh * 0.55, bw * 0.2, 22));
        ctx.font = `bold ${fs}px Arial, sans-serif`;

        let lines = wrapText(ctx, b.mongolian, maxW);
        let lh = fs * 1.35;

        // Shrink if overflows
        if(lines.length * lh > fh - 4) {
          fs = Math.max(8, fs * ((fh - 4) / (lines.length * lh)) * 0.9);
          ctx.font = `bold ${fs}px Arial, sans-serif`;
          lines = wrapText(ctx, b.mongolian, maxW);
          lh = fs * 1.35;
        }

        const ty = fy + (fh - lines.length * lh) / 2 + fs * 0.85;
        lines.forEach((line, i) => ctx.fillText(line, fx + fw/2, ty + i*lh, maxW));
      }

      resolve();
    };
    img.src = imgDataUrl;
  });
}

function sampleBg(ctx, x, y, w, h) {
  const pts = [[x+2,y+2],[x+w-2,y+2],[x+2,y+h-2],[x+w-2,y+h-2]];
  let r=0,g=0,b=0,n=0;
  for(const [px,py] of pts) {
    try {
      const d = ctx.getImageData(Math.round(px),Math.round(py),1,1).data;
      r+=d[0]; g+=d[1]; b+=d[2]; n++;
    } catch(e){}
  }
  if(!n) return '#ffffff';
  return `rgb(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)})`;
}

function isDark(col) {
  const m = col.match(/\d+/g);
  if(!m || m.length < 3) return false;
  return (+m[0]*299 + +m[1]*587 + +m[2]*114)/1000 < 128;
}

function wrapText(ctx, text, maxW) {
  if(!text) return [''];
  const words = text.split(' ');
  const lines = []; let cur = '';
  for(const w of words) {
    const t = cur ? cur+' '+w : w;
    if(ctx.measureText(t).width > maxW && cur) { lines.push(cur); cur = w; }
    else cur = t;
  }
  if(cur) lines.push(cur);
  return lines.length ? lines : [text];
}

// ── Render text list ─────────────────────────────────────────────
function renderList() {
  tlist.innerHTML = '';
  cntlabel.textContent = blocks.length + ' БЛОК';
  blocks.forEach(b => {
    const d = document.createElement('div');
    d.className = 'tcard';
    d.innerHTML = `<div class="tcard-kr">${esc(b.korean)}</div>
      <div class="tcard-arr">▼ МОНГОЛ</div>
      <div class="tcard-mn">${esc(b.mongolian)}</div>`;
    tlist.appendChild(d);
  });
}

// ── Download ─────────────────────────────────────────────────────
btnDl.addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'manhwa_mn.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

// ── Reset ─────────────────────────────────────────────────────────
btnRst.addEventListener('click', () => {
  imgDataUrl = null; blocks = [];
  fileIn.value = '';
  zone.classList.remove('has-image','drag');
  const img = zone.querySelector('img.prev'); if(img) img.remove();
  zone.querySelectorAll('.upload-icon,.upload-title,.upload-sub')
      .forEach(el => el.style.display = '');
  resultEl.classList.remove('show');
  hideErr(); clearSteps();
  btnGo.disabled = true;
});

// ── Helpers ───────────────────────────────────────────────────────
function setP(pct, txt) { pfill.style.width=pct+'%'; plabel.textContent=txt; }
function step(el, state) { el.className='step'; if(state) el.classList.add(state); }
function clearSteps() { [s1,s2,s3].forEach(s => s.className='step'); }
function showErr(msg) { errbox.textContent='⚠ '+msg; errbox.classList.add('show'); }
function hideErr() { errbox.classList.remove('show'); errbox.textContent=''; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
</script>
</body>
</html>
